<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Akhil Kumar — AI and Robotics, AI Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1B2E"/>
      <stop offset="55%" stop-color="#10233B"/>
      <stop offset="100%" stop-color="#0B1626"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#19C5B4" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#19C5B4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- ===== Network / community-detection motif (right side) ===== -->
  <g stroke="#3A597A" stroke-width="1" opacity="0.55">
    <line x1="930" y1="70"  x2="1020" y2="120"/>
    <line x1="1020" y1="120" x2="980" y2="200"/>
    <line x1="980" y1="200" x2="900" y2="170"/>
    <line x1="900" y1="170" x2="930" y2="70"/>
    <line x1="1020" y1="120" x2="1110" y2="90"/>
    <line x1="1110" y1="90" x2="1130" y2="180"/>
    <line x1="1130" y1="180" x2="980" y2="200"/>
    <line x1="900" y1="170" x2="850" y2="240"/>
    <line x1="980" y1="200" x2="1050" y2="245"/>
    <line x1="930" y1="70" x2="860" y2="110"/>
  </g>

  <!-- Community A (teal) -->
  <g fill="#19C5B4">
    <circle cx="930" cy="70" r="6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="120" r="7"/>
    <circle cx="860" cy="110" r="4"><animate attributeName="opacity" values="1;0.4;1" dur="3.6s" repeatCount="indefinite"/></circle>
  </g>
  <!-- Community B (amber) -->
  <g fill="#E8A13A">
    <circle cx="980" cy="200" r="6"><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="170" r="5"/>
    <circle cx="850" cy="240" r="4"><animate attributeName="opacity" values="1;0.5;1" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="245" r="4"/>
  </g>
  <!-- Community C (violet) -->
  <g fill="#7C7CF0">
    <circle cx="1110" cy="90" r="6"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="180" r="5"/>
  </g>

  <!-- ===== Text block (left) ===== -->
  <text x="72" y="118" font-family="'Segoe UI',Arial,sans-serif" font-size="58" font-weight="700" fill="#EAF0F6" letter-spacing="1">AKHIL KUMAR</text>

  <!-- Accent underline -->
  <rect x="74" y="135" width="190" height="4" rx="2" fill="#19C5B4"/>

  <text x="74" y="178" font-family="'Segoe UI',Arial,sans-serif" font-size="23" font-weight="600" fill="#19C5B4" letter-spacing="3">AI &amp; ROBOTICS &#160;·&#160; AI ENGINEER</text>

  <text x="74" y="216" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#9DB0C6">Building intelligent systems that reason, remember, and act.</text>

  <!-- Small focus tags -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#7E92AB" letter-spacing="1">
    <text x="74" y="252">AGENTIC AI</text>
    <text x="190" y="252">·</text>
    <text x="205" y="252">LLMs &amp; RAG</text>
    <text x="320" y="252">·</text>
    <text x="335" y="252">COMPUTER VISION</text>
    <text x="500" y="252">·</text>
    <text x="515" y="252">MACHINE LEARNING</text>
  </g>
</svg>
